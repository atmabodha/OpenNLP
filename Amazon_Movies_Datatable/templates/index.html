<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Amazon Prime Movies – Notebook Output</title>

    <!-- DataTables CDN -->
    <link  rel="stylesheet"
           href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; }
        table.dataTable thead th { white-space: nowrap; }
        .wrap { white-space: normal; max-width: 480px; }
    </style>
</head>
<body>
    <h2>Amazon Prime Movies – Data from Colab Notebook</h2>

    <table id="movies" class="display" style="width:100%">
        <thead><tr>{% for col in columns %}<th>{{ col }}</th>{% endfor %}</tr></thead>
        <tbody>
        {% for m in movies %}
            <tr>
                {% for col in columns %}
                    <td class="{% if col|lower in ['plot overview','imdb plot','cast'] %}wrap{% endif %}">
                        {{ m[col] }}
                    </td>
                {% endfor %}
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <script>
        $(function () { 
            $('#movies').DataTable({
                pageLength: 25,
                autoWidth: true,
                columnDefs: [
                    { targets: '_all', className: 'dt-left' },
                    { 
                        targets: ['Website URL', 'IMDb URL', 'Poster URL', 'Runtime', 'Release Year', 'IMDb Rating', 'Rotten Tomatoes Rating'],
                        width: '10%',
                        className: 'dt-center'
                    },
                    { 
                        targets: ['Title', 'Genre', 'Director', 'Cast', 'Language'],
                        width: '15%'
                    },
                    { 
                        targets: ['Plot Overview', 'IMDb Plot'],
                        width: '25%',
                        className: 'wrap'
                    }
                ],
                responsive: true
            }); 
        });
    </script>
</body>
</html>
